services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_USER1_NAME: ${NEXT_PUBLIC_USER1_NAME:-}
        NEXT_PUBLIC_USER2_NAME: ${NEXT_PUBLIC_USER2_NAME:-}
        NEXT_PUBLIC_USER3_NAME: ${NEXT_PUBLIC_USER3_NAME:-}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    ports:
      - "${PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@db:5432/nido
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_USER1_NAME: ${NEXT_PUBLIC_USER1_NAME:-}
      NEXT_PUBLIC_USER2_NAME: ${NEXT_PUBLIC_USER2_NAME:-}
      NEXT_PUBLIC_USER3_NAME: ${NEXT_PUBLIC_USER3_NAME:-}
      AUTH_USER1_NAME: ${AUTH_USER1_NAME:-}
      AUTH_USER1_PASSWORD: ${AUTH_USER1_PASSWORD:-}
      AUTH_USER2_NAME: ${AUTH_USER2_NAME:-}
      AUTH_USER2_PASSWORD: ${AUTH_USER2_PASSWORD:-}
      AUTH_USER3_NAME: ${AUTH_USER3_NAME:-}
      AUTH_USER3_PASSWORD: ${AUTH_USER3_PASSWORD:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@nido.local}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nido
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
